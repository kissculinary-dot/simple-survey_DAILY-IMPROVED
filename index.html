<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Customer Feedback</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="refresh" content="21600">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f7fb;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
}

.header{
margin-top:80px;
font-size:50px;
}

.menuContainer{
margin-top:80px;
display:flex;
gap:200px;
}

.menuCard{
display:flex;
flex-direction:column;
align-items:center;
}

.menuTitle{
font-size:36px;
margin-bottom:40px;
}

.buttonRow{
display:flex;
gap:40px;
}

.feedbackBtn{
width:200px;
height:200px;
border-radius:50%;
border:none;
font-size:60px;
color:white;
cursor:pointer;
}

.koreanBtn{
background:#c62828;
}

.americanBtn{
background:#1e3a8a;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px 60px;
border-radius:10px;
box-shadow:0 10px 40px rgba(0,0,0,.3);
display:none;
font-size:26px;
}

/* Manager dashboard */

#managerScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
color:white;
display:none;
flex-direction:column;
align-items:center;
overflow:auto;
padding-top:40px;
}

.statBox{
font-size:26px;
margin-bottom:30px;
}

canvas{
background:white;
margin:20px;
}

#trigger{
position:fixed;
top:0;
right:0;
width:120px;
height:120px;
}

</style>
</head>

<body>

<div id="trigger"></div>

<div id="screen"></div>

<div id="popup">Thank you for your feedback!</div>

<div id="managerScreen">

<h1>Restaurant Analytics</h1>

<div class="statBox" id="stats"></div>

<h2>Customer Satisfaction</h2>
<div id="satisfaction"></div>

<h2>7 Day Menu Trend</h2>
<canvas id="trendChart" width="600" height="300"></canvas>

<h2>Hourly Traffic</h2>
<canvas id="hourChart" width="600" height="300"></canvas>

<p>Tap anywhere to close</p>

</div>

<script>

const SCRIPT_URL="PASTE_YOUR_SCRIPT_URL_HERE";

const popup=document.getElementById("popup");

/* TIME BASED MENU */

function loadScreen(){

const now=new Date();

const mins=now.getHours()*60+now.getMinutes();

const breakfastStart=7*60;
const breakfastEnd=11*60+59;

const lunchStart=12*60;
const lunchEnd=17*60+29;

const dinnerStart=17*60+30;
const dinnerEnd=21*60;

let html="";

if(mins>=breakfastStart && mins<=breakfastEnd){

html=`

<div class="header">How was your breakfast?</div>

<div class="menuContainer" style="gap:0">

<div class="menuCard">

<div class="menuTitle">Breakfast</div>

<div class="buttonRow">

<button class="feedbackBtn" style="background:#888"
data-menu="Breakfast"
data-response="Loved it">👍</button>

<button class="feedbackBtn" style="background:#888"
data-menu="Breakfast"
data-response="Needs Improvement">👎</button>

</div>

</div>

</div>

`;

}

else if(mins>=lunchStart && mins<=lunchEnd){

html=`

<div class="header">How was your meal today?</div>

<div class="menuContainer">

<div class="menuCard">

<div class="menuTitle" style="color:#c62828">Korean Menu</div>

<div class="buttonRow">

<button class="feedbackBtn koreanBtn"
data-menu="Korean Menu"
data-response="Loved it">👍</button>

<button class="feedbackBtn koreanBtn"
data-menu="Korean Menu"
data-response="Needs Improvement">👎</button>

</div>

</div>

<div class="menuCard">

<div class="menuTitle" style="color:#1e3a8a">American Menu</div>

<div class="buttonRow">

<button class="feedbackBtn americanBtn"
data-menu="American Menu"
data-response="Loved it">👍</button>

<button class="feedbackBtn americanBtn"
data-menu="American Menu"
data-response="Needs Improvement">👎</button>

</div>

</div>

</div>

`;

}

else if(mins>=dinnerStart && mins<=dinnerEnd){

html=`

<div class="header">How was your dinner?</div>

<div class="menuContainer" style="gap:0">

<div class="menuCard">

<div class="menuTitle">Dinner</div>

<div class="buttonRow">

<button class="feedbackBtn" style="background:#555"
data-menu="Dinner"
data-response="Loved it">👍</button>

<button class="feedbackBtn" style="background:#555"
data-menu="Dinner"
data-response="Needs Improvement">👎</button>

</div>

</div>

</div>

`;

}

document.getElementById("screen").innerHTML=html;

attachButtons();

}

setInterval(loadScreen,60000);
loadScreen();

/* BUTTON EVENTS */

function attachButtons(){

document.querySelectorAll(".feedbackBtn").forEach(btn=>{

btn.onclick=()=>{

fetch(https://script.google.com/macros/s/AKfycbwATBL0-o0_d52bSJaYImVZwJ0LBP-NqVi5RPMl8op7Q0unpdvmUDH9tVdIMqvcUhgC/exec,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({

menu:btn.dataset.menu,
response:btn.dataset.response,
timestamp:new Date().toISOString()

})

});

popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},1500);

};

});

}

/* MANAGER MODE */

let taps=0;

document.getElementById("trigger").onclick=()=>{

taps++;

if(taps>=5){

openManager();

taps=0;

}

setTimeout(()=>{taps=0},2000);

};

function openManager(){

document.getElementById("managerScreen").style.display="flex";

loadStats();

}

document.getElementById("managerScreen").onclick=()=>{

document.getElementById("managerScreen").style.display="none";

};

/* LOAD STATS */

function loadStats(){

fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{

document.getElementById("stats").innerHTML=`

Breakfast 👍 ${data.today.breakfast_up || 0}
👎 ${data.today.breakfast_down || 0}<br><br>

Korean 👍 ${data.today.korean_up || 0}
👎 ${data.today.korean_down || 0}<br><br>

American 👍 ${data.today.american_up || 0}
👎 ${data.today.american_down || 0}<br><br>

Dinner 👍 ${data.today.dinner_up || 0}
👎 ${data.today.dinner_down || 0}

`;

let up =
(data.today.breakfast_up||0)+
(data.today.korean_up||0)+
(data.today.american_up||0)+
(data.today.dinner_up||0);

let down =
(data.today.breakfast_down||0)+
(data.today.korean_down||0)+
(data.today.american_down||0)+
(data.today.dinner_down||0);

let percent=0;

if(up+down>0){
percent=Math.round((up/(up+down))*100);
}

document.getElementById("satisfaction").innerHTML=
percent+"% Positive";

/* WEEKLY TREND */

let labels=data.weekly.map(d=>d.date);
let korean=data.weekly.map(d=>d.korean);
let american=data.weekly.map(d=>d.american);

new Chart(document.getElementById("trendChart"),{

type:'line',

data:{
labels:labels,
datasets:[
{label:"Korean",data:korean},
{label:"American",data:american}
]
}

});

/* HOURLY TRAFFIC */

new Chart(document.getElementById("hourChart"),{

type:'bar',

data:{
labels:[...Array(24).keys()],
datasets:[
{label:"Customers",data:data.hourly || []}
]
}

});

});

}

</script>

</body>
</html>
