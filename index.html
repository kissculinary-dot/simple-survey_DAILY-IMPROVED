<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Customer Feedback</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Auto refresh every 6 hours -->
<meta http-equiv="refresh" content="21600">

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f7fb;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
height:100vh;
text-align:center;
}

/* Header */

.header{
margin-top:80px;
}

.header h1{
font-size:54px;
margin:0;
}

/* Menu Layout */

.menuContainer{
margin-top:90px;
display:flex;
gap:220px;
justify-content:center;
}

.menuCard{
display:flex;
flex-direction:column;
align-items:center;
}

.menuTitle{
font-size:38px;
font-weight:700;
margin-bottom:50px;
}

.korean{ color:#c62828; }
.american{ color:#1e3a8a; }

.buttonRow{
display:flex;
gap:40px;
}

/* Buttons */

.feedbackBtn{
width:200px;
height:200px;
border-radius:50%;
border:none;
font-size:60px;
cursor:pointer;
color:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 20px 55px rgba(0,0,0,0.2);
transition:.25s;
position:relative;
overflow:hidden;
}

.koreanBtn{
background:linear-gradient(145deg,#d32f2f,#b71c1c);
}

.americanBtn{
background:linear-gradient(145deg,#1e3a8a,#0f2557);
}

.feedbackBtn:hover{
transform:scale(1.08);
}

.feedbackBtn:active{
transform:scale(.93);
}

/* Popup */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
background:white;
padding:40px 70px;
border-radius:14px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
font-size:28px;
font-weight:600;
opacity:0;
pointer-events:none;
}

.show{
animation:popup .45s forwards;
}

@keyframes popup{
0%{transform:translate(-50%,-50%) scale(.8);opacity:0}
50%{transform:translate(-50%,-50%) scale(1.05);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* Hidden manager tap area */

#managerTrigger{
position:fixed;
top:0;
right:0;
width:120px;
height:120px;
z-index:999;
}

/* Manager Screen */

#managerScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
color:white;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:30px;
}

.managerBox{
margin:20px;
}

</style>
</head>

<body>

<div id="managerTrigger"></div>

<div id="screen"></div>

<div id="popup">Thank you for your feedback!</div>

<div id="managerScreen">
<h1>Manager Dashboard</h1>

<div class="managerBox" id="stats">
Loading stats...
</div>

<p style="font-size:18px;">Tap anywhere to exit</p>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwATBL0-o0_d52bSJaYImVZwJ0LBP-NqVi5RPMl8op7Q0unpdvmUDH9tVdIMqvcUhgC/exec";

/* ------------------------------
TIME BASED SCREEN SWITCHING
--------------------------------*/

function loadScreen(){

const now=new Date();

const hour=now.getHours();
const minute=now.getMinutes();
const current=hour*60+minute;

const breakfastStart=7*60;
const breakfastEnd=11*60+59;

const lunchStart=12*60;
const lunchEnd=17*60+29;

const dinnerStart=17*60+30;
const dinnerEnd=21*60;

let html="";

if(current>=breakfastStart && current<=breakfastEnd){

html=`

<div class="header">
<h1>How was your breakfast?</h1>
</div>

<div class="menuContainer" style="gap:0;">
<div class="menuCard">

<div class="menuTitle">Breakfast</div>

<div class="buttonRow">
<button class="feedbackBtn" style="background:#777;" data-menu="Breakfast" data-response="Loved it">👍</button>
<button class="feedbackBtn" style="background:#777;" data-menu="Breakfast" data-response="Needs Improvement">👎</button>
</div>

</div>
</div>

`;

}

else if(current>=lunchStart && current<=lunchEnd){

html=`

<div class="header">
<h1>How was your meal today?</h1>
</div>

<div class="menuContainer">

<div class="menuCard">
<div class="menuTitle korean">Korean Menu</div>

<div class="buttonRow">
<button class="feedbackBtn koreanBtn" data-menu="Korean Menu" data-response="Loved it">👍</button>
<button class="feedbackBtn koreanBtn" data-menu="Korean Menu" data-response="Needs Improvement">👎</button>
</div>
</div>

<div class="menuCard">
<div class="menuTitle american">American Menu</div>

<div class="buttonRow">
<button class="feedbackBtn americanBtn" data-menu="American Menu" data-response="Loved it">👍</button>
<button class="feedbackBtn americanBtn" data-menu="American Menu" data-response="Needs Improvement">👎</button>
</div>
</div>

</div>

`;

}

else if(current>=dinnerStart && current<=dinnerEnd){

html=`

<div class="header">
<h1>How was your dinner?</h1>
</div>

<div class="menuContainer" style="gap:0;">
<div class="menuCard">

<div class="menuTitle">Dinner</div>

<div class="buttonRow">
<button class="feedbackBtn" style="background:#555;" data-menu="Dinner" data-response="Loved it">👍</button>
<button class="feedbackBtn" style="background:#555;" data-menu="Dinner" data-response="Needs Improvement">👎</button>
</div>

</div>
</div>

`;

}

document.getElementById("screen").innerHTML=html;

attachButtons();

}

setInterval(loadScreen,60000);
loadScreen();

/* ------------------------------
BUTTON FEEDBACK
--------------------------------*/

function attachButtons(){

document.querySelectorAll(".feedbackBtn").forEach(btn=>{

btn.addEventListener("click",()=>{

const menu=btn.dataset.menu;
const response=btn.dataset.response;

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
menu:menu,
response:response,
timestamp:new Date().toISOString()
})
});

const popup=document.getElementById("popup");

popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},1800);

});

});

}

/* ------------------------------
HIDDEN MANAGER MODE
--------------------------------*/

let tapCount=0;

document.getElementById("managerTrigger").addEventListener("click",()=>{

tapCount++;

if(tapCount>=5){

openManager();

tapCount=0;

}

setTimeout(()=>{tapCount=0},2000);

});

function openManager(){

document.getElementById("managerScreen").style.display="flex";

loadStats();

}

document.getElementById("managerScreen").addEventListener("click",()=>{

document.getElementById("managerScreen").style.display="none";

});

/* ------------------------------
LOAD STATS
--------------------------------*/

function loadStats(){

fetch(SCRIPT_URL)

.then(res=>res.json())

.then(data=>{

document.getElementById("stats").innerHTML=`

Breakfast 👍 ${data.breakfast_up} | 👎 ${data.breakfast_down}<br><br>

Korean 👍 ${data.korean_up} | 👎 ${data.korean_down}<br><br>

American 👍 ${data.american_up} | 👎 ${data.american_down}<br><br>

Dinner 👍 ${data.dinner_up} | 👎 ${data.dinner_down}

`;

})

.catch(()=>{

document.getElementById("stats").innerHTML="Unable to load stats.";

});

}

</script>

</body>
</html>
