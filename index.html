<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

body{
margin:0;
font-family:
'Montserrat',
'Apple Color Emoji',
'Segoe UI Emoji',
'Noto Color Emoji',
'Twemoji Mozilla',
sans-serif;

background:#f4f7fb;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
text-align:center;
}

/* Header */

.header{
margin-top:80px;
}

.header h1{
font-size:110px; /* UPDATED: bigger header */
margin:0;
color:#222;
}

/* Main Area */

.mainArea{
flex:1;
display:flex;
align-items:center;
justify-content:center;
width:100%;
max-width:1200px;
margin:auto;
}

/* Menu Layout */

.menuContainer{
display:flex;
gap:180px;
justify-content:center;
}

.menuCard{
display:flex;
flex-direction:column;
align-items:center;
transition:0.3s;
}

/* Titles */

.menuTitle{
font-size:66px; /* UPDATED: slightly smaller */
font-weight:700;
margin-bottom:70px;
}

.korean{color:#c62828;}
.american{color:#1e3a8a;}
.whiteTitle{color:#444;}

/* Buttons */

.buttonRow{
display:flex;
gap:70px;
}

.feedbackBtn{
width:300px;
height:300px;
border-radius:50%;
border:none;
font-size:100px;
cursor:pointer;
color:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 25px 65px rgba(0,0,0,0.25);
transition:.25s;
position:relative;
overflow:hidden;

font-family:
'Noto Color Emoji',
'Apple Color Emoji',
'Segoe UI Emoji',
sans-serif;
}

.koreanBtn{
background:linear-gradient(145deg,#d32f2f,#b71c1c);
}

.americanBtn{
background:linear-gradient(145deg,#1e3a8a,#0f2557);
}

.whiteBtn{
background:linear-gradient(145deg,#ffffff,#eaeaea);
color:#333;
}

.feedbackBtn:hover{
transform:scale(1.08);
}

.feedbackBtn:active{
transform:scale(.93);
}

/* Popup */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
background:white;
padding:40px 70px;
border-radius:14px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
font-size:32px;
font-weight:600;
opacity:0;
pointer-events:none;
}

.show{
animation:popup .45s forwards;
}

@keyframes popup{
0%{transform:translate(-50%,-50%) scale(.8);opacity:0}
50%{transform:translate(-50%,-50%) scale(1.05);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* Hearts */

.heart{
position:fixed;
font-size:26px;
animation:floatHeart 2.2s ease-out forwards;
pointer-events:none;
font-family:
'Noto Color Emoji',
'Apple Color Emoji',
'Segoe UI Emoji',
sans-serif;
}

@keyframes floatHeart{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-200px) scale(1.8);opacity:0;}
}

/* Crying emojis */

.cry{
position:fixed;
font-size:26px;
animation:floatCry 2.2s ease-out forwards;
pointer-events:none;
font-family:
'Noto Color Emoji',
'Apple Color Emoji',
'Segoe UI Emoji',
sans-serif;
}

@keyframes floatCry{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-180px) scale(1.5);opacity:0;}
}

/* Manager Dashboard */

#manager{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:32px;
text-align:center;
}

#manager h1{
font-size:52px;
letter-spacing:1px;
margin-bottom:40px;
}

#closeManager{
position:absolute;
top:25px;
right:35px;
font-size:36px;
cursor:pointer;
color:white;
}

#stats{
margin-top:20px;
font-size:34px;
line-height:2.2;
font-weight:600;
}

.statRow{
margin:18px 0;
}

/* MOBILE */

@media (max-width:768px){

.header{
margin-top:40px;
}

.header h1{
font-size:48px; /* UPDATED */
padding:0 20px;
}

.menuContainer{
flex-direction:column;
gap:60px;
align-items:center;
}

.menuTitle{
font-size:36px; /* UPDATED */
margin-bottom:30px;
}

.buttonRow{
gap:25px;
}

.feedbackBtn{
width:140px;
height:140px;
font-size:50px;
}

}

</style>

</head>

<body>

<div class="header">
<h1>How was your meal today?</h1>
</div>

<div class="mainArea">
<div id="content"></div>
</div>

<div id="popup">Thank you for your feedback!</div>

<div id="manager">
<div id="closeManager">✕</div>
<h1>Manager Dashboard</h1>
<div id="stats">Loading...</div>
</div>

<audio id="clickSound" src="sparkle.mp3" preload="auto"></audio>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwATBL0-o0_d52bSJaYImVZwJ0LBP-NqVi5RPMl8op7Q0unpdvmUDH9tVdIMqvcUhgC/exec";

document.body.addEventListener("click", () => {
  const sound = document.getElementById("clickSound");
  sound.play().then(() => {
    sound.pause();
    sound.currentTime = 0;
  }).catch(()=>{});
}, { once: true });

function updateScreen(){

const now=new Date();
const minutes=now.getHours()*60+now.getMinutes();

let html="";
let singleMenu=false;

if(minutes>=420 && minutes<720){

singleMenu=true;

html=`
<div class="menuContainer">
<div class="menuCard">
<div class="menuTitle whiteTitle">Breakfast</div>
<div class="buttonRow">
<button class="feedbackBtn whiteBtn" data-menu="Breakfast" data-response="Loved it">👍</button>
<button class="feedbackBtn whiteBtn" data-menu="Breakfast" data-response="Needs Improvement">👎</button>
</div>
</div>
</div>
`;

}

else if(minutes>=720 && minutes<1050){

html=`
<div class="menuContainer">

<div class="menuCard">
<div class="menuTitle korean">Korean Menu</div>
<div class="buttonRow">
<button class="feedbackBtn koreanBtn" data-menu="Korean Menu" data-response="Loved it">👍</button>
<button class="feedbackBtn koreanBtn" data-menu="Korean Menu" data-response="Needs Improvement">👎</button>
</div>
</div>

<div class="menuCard">
<div class="menuTitle american">American Menu</div>
<div class="buttonRow">
<button class="feedbackBtn americanBtn" data-menu="American Menu" data-response="Loved it">👍</button>
<button class="feedbackBtn americanBtn" data-menu="American Menu" data-response="Needs Improvement">👎</button>
</div>
</div>

</div>
`;

}

else if(minutes>=1050 && minutes<1260){

singleMenu=true;

html=`
<div class="menuContainer">
<div class="menuCard">
<div class="menuTitle whiteTitle">Dinner</div>
<div class="buttonRow">
<button class="feedbackBtn whiteBtn" data-menu="Dinner" data-response="Loved it">👍</button>
<button class="feedbackBtn whiteBtn" data-menu="Dinner" data-response="Needs Improvement">👎</button>
</div>
</div>
</div>
`;

}

document.getElementById("content").innerHTML=html;

/* Scaling */
if(singleMenu){
  document.querySelector(".menuCard").style.transform="scale(1.3)";
} else {
  document.querySelectorAll(".menuCard").forEach(card=>{
    card.style.transform="scale(1.15)";
  });
}

attachButtons();
}

function showHearts(){
for(let i=0;i<22;i++){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=Math.random()*window.innerHeight+"px";
heart.style.fontSize=(20+Math.random()*28)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),2500);
}
}

function showCry(){
for(let i=0;i<18;i++){
const cry=document.createElement("div");
cry.className="cry";
cry.innerHTML="😢";
cry.style.left=Math.random()*window.innerWidth+"px";
cry.style.top=Math.random()*window.innerHeight+"px";
cry.style.fontSize=(20+Math.random()*28)+"px";
document.body.appendChild(cry);
setTimeout(()=>cry.remove(),2500);
}
}

function attachButtons(){
document.querySelectorAll(".feedbackBtn").forEach(btn=>{
btn.addEventListener("click",()=>{

const sound=document.getElementById("clickSound");
sound.currentTime=0;
sound.volume=0.4;
sound.play().catch(()=>{});

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
menu:btn.dataset.menu,
response:btn.dataset.response,
timestamp:new Date().toISOString()
})
});

if(btn.dataset.response==="Loved it") showHearts();
if(btn.dataset.response==="Needs Improvement") showCry();

showPopup();

});
});
}

function showPopup(){
const popup=document.getElementById("popup");
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),1000);
}

updateScreen();
setInterval(updateScreen,60000);

</script>

</body>
</html>
